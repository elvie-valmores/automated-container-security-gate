name: DevSecOps Container Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scanning:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download the code to the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Gate 0: Infrastructure as Code (IaC) Scanner (Scan the foundation first!)
      - name: Trivy IaC Scan (Terraform)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: './terraform' 
          exit-code: '1' 
          severity: 'HIGH,CRITICAL'

      # Step 2: Build the application
      - name: Build the Docker Image
        run: docker build -t vulnerable-app:latest .

      # Gate 1: GRC / Misconfiguration Scanner
      - name: Trivy Config Scan (GRC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          exit-code: '1' 
          severity: 'HIGH,CRITICAL'

      # Gate 2: Vulnerability Scanner (CVEs)
      - name: Trivy Image Scan (CVEs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vulnerable-app:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL' 
          ignore-unfixed: true